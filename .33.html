<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AMERICAN MEGA STORE</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: sans-serif; }
        body { 
            background: #0b0e14; 
            color: white; 
            /* خلفية علم أمريكا */
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                              url('https://images.unsplash.com/photo-1543443432-d3d0f032230a?q=80&w=2070');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
        }

        header { padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); }
        .logo { font-size: 28px; font-weight: bold; color: #fff; }
        .logo span { color: #d11d1d; }
        
        .hero { padding: 80px 5%; text-align: center; }
        .hero h1 { font-size: 50px; margin-bottom: 10px; text-shadow: 2px 2px 10px #000; }
        
        .products { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 40px 5%; }
        .card { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.2); }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; margin-bottom: 10px; }
        
        .price { font-size: 18px; font-weight: bold; color: #00ffae; margin: 10px 0; }
        .btn { width: 100%; padding: 10px; border: none; border-radius: 5px; cursor: pointer; background: #d11d1d; color: white; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="logo">MEGA <span>STORE</span></div>
    <div>🛒 Cart (0)</div>
</header>

<section class="hero">
    <h1>AMERICAN MEGA STORE</h1>
    <p>Premium Quality Products</p>
</section>

<section class="products" id="products"></section>

<script>
    const products = [
        {name: "American Sports Gear", price: 49, img: "https://images.unsplash.com/photo-1526401485004-4691078de57a?q=80&w=600"},
        {name: "Classic USA Hoodie", price: 75, img: "https://images.unsplash.com/photo-1556821840-3a63f95609a7?q=80&w=600"},
        {name: "Premium Tech Gadget", price: 120, img: "https://images.unsplash.com/photo-1550009158-9ebf69173e03?q=80&w=600"},
        {name: "Professional Tool Kit", price: 85, img: "https://images.unsplash.com/photo-1581822261290-990b3863a352?q=80&w=600"}
    ];

    const container = document.getElementById("products");
    products.forEach(p => {
        container.innerHTML += `
            <div class="card">
                <img src="${p.img}" alt="${p.name}">
                <h3>${p.name}</h3>
                <div class="price">$${p.price}</div>
                <button class="btn">Add to Cart</button>
            </div>
        `;
    });
</script>

</body>
</html>
